version: '3.8'

services:
  payment-app:
    build: .
    container_name: sslcommerz-payment-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - BASE_URL=${BASE_URL:-https://yourdomain.com}
      - FRONTEND_URL=${FRONTEND_URL:-https://yourdomain.com}
      - MONGODB_URI=${MONGODB_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - STORE_ID=${STORE_ID}
      - STORE_PASSWORD=${STORE_PASSWORD}
      - SSLCOMMERZ_SESSION_API=https://securepay.sslcommerz.com/gwprocess/v4/api.php
      - SSLCOMMERZ_VALIDATION_API=https://securepay.sslcommerz.com/validator/api/validationApi.php
      - IS_LIVE=true
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - payment-network

networks:
  payment-network:
    driver: bridge
